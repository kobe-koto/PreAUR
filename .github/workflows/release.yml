name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build_and_release:
    name: Build and Release preaur
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun runtime
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Project
        run: |
          bun run build # build PreAUR
          bun run gen-schema # generate preaur.schema.json

      - name: Prepare Artifact
        run: |
          version="${GITHUB_REF_NAME#v}"
          artifact_name="preaur-v${version}"
          artifact_dir="./dist/release/${artifact_name}"

          install -Dm755 ./dist/index.js "${artifact_dir}/preaur"
          install -Dm644 ./preaur.schema.json "${artifact_dir}/preaur.schema.json"
          install -Dm644 ./docs/config-reference.md "${artifact_dir}/docs/config-reference.md"
          install -Dm644 ./docs/man/preaur.1 "${artifact_dir}/docs/man/preaur.1"
          install -Dm644 ./docs/man/preaur-config.5 "${artifact_dir}/docs/man/preaur-config.5"
          install -Dm644 ./README.md "${artifact_dir}/README.md"
          install -Dm644 ./LICENSE "${artifact_dir}/LICENSE"
          install -Dm644 ./package.json "${artifact_dir}/package.json"

          tar -C ./dist/release -czf "./dist/${artifact_name}.tar.gz" "${artifact_name}"
          sha256sum "./dist/${artifact_name}.tar.gz" > "./dist/${artifact_name}.tar.gz.sha256"

      - name: Generate Release Notes
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash ./.github/generate-release-notes.sh

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: release.md
          files: |
            ./dist/preaur-v*.tar.gz
            ./dist/preaur-v*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
